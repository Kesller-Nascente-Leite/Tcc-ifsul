# =========================================================
# DEVELOPMENT CONFIGURATION PROFILE
# =========================================================
# Use este perfil localmente: java -Dspring.profiles.active=dev -jar app.jar

# =========================================================
# SERVER CONFIGURATION
# =========================================================
server.port=8080
#server.servlet.context-path=/api
spring.web.error.include-message=always

# =========================================================
# DATABASE CONFIGURATION - PostgreSQL Local
# =========================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/tcc
spring.datasource.username=postgres
spring.datasource.password=Kesller00K7
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# =========================================================
# JPA/HIBERNATE CONFIGURATION
# =========================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

# =========================================================
# FLYWAY CONFIGURATION
# =========================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=Baseline

# =========================================================
# LOGGING CONFIGURATION - DEBUG
# =========================================================
logging.level.root=INFO
logging.level.com.meutcc.backend=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.boot.autoconfigure=DEBUG
logging.level.org.springframework.data=DEBUG

# =========================================================
# APPLICATION CONFIGURATION
# =========================================================
spring.application.name=TCC Backend
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.default-property-inclusion=non_null

# =========================================================
# SECURITY CONFIGURATION
# =========================================================
spring.security.user.name=admin
spring.security.user.password=admin123

# =========================================================
# MAIL CONFIGURATION (Local Development - Disabled)
# =========================================================
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# =========================================================
# JWT CONFIGURATION
# =========================================================
api.security.token.secret=dGVzdC1zZWNyZXQtZm9yLWRldmVsb3BtZW50LWFuZC10ZXN0aW5n
api.security.token.expiration=86400000
