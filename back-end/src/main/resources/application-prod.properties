# =========================================================
# PRODUCTION CONFIGURATION PROFILE
# =========================================================
# Use este perfil em produção: java -Dspring.profiles.active=prod -jar app.jar

# =========================================================
# SERVER CONFIGURATION
# =========================================================
server.port=8080
server.servlet.context-path=/api
spring.web.error.include-message=never
server.compression.enabled=true
server.compression.min-response-size=1024

# =========================================================
# DATABASE CONFIGURATION - PostgreSQL Production
# =========================================================
# Configure com variáveis de ambiente em produção!
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/tcc}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =========================================================
# JPA/HIBERNATE CONFIGURATION
# =========================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.statement_cache_size=250
spring.jpa.properties.hibernate.generate_statistics=false

# =========================================================
# FLYWAY CONFIGURATION
# =========================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=0
spring.flyway.out-of-order=false

# =========================================================
# LOGGING CONFIGURATION - Production (Minimal)
# =========================================================
logging.level.root=WARN
logging.level.com.meutcc.backend=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# =========================================================
# APPLICATION CONFIGURATION
# =========================================================
spring.application.name=TCC Backend
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.default-property-inclusion=non_null

# =========================================================
# SECURITY CONFIGURATION - Production
# =========================================================
# Altere para valores seguros em produção!
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD}

# =========================================================
# MAIL CONFIGURATION - Production
# =========================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# =========================================================
# ACTUATOR CONFIGURATION - Health Endpoints
# =========================================================
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized

# =========================================================
# JWT CONFIGURATION - Production
# =========================================================
# Use uma chave secreta forte em produção!
api.security.token.secret=${JWT_SECRET}
